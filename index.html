<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Рейтинговая Система</title>
  <style>
    :root { 
      --bg: #050000; --card: #120303; --border: #3d0000; --text: #ffffff; 
      --gold: #f0b90b; --blood: #cc0000; --win-blue: #00d2ff; --lose-orange: #ff8c00;
    }
    body { 
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://imgur.com'); 
      background-size: cover; background-position: center; background-attachment: fixed;
      color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 10px 100px 10px;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    header { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
    h1 { color: var(--blood); font-size: 1.8em; text-shadow: 0 0 15px rgba(204,0,0,0.6); margin-bottom: 20px; }
    
    .container { width: 95%; max-width: 500px; }
    .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; margin-top: 12px; padding: 16px; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
    
    .badge { font-size: 0.75em; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; border: 1.5px solid; margin-top: 5px; display: inline-block; }
    .rank-Дракон { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 20px var(--gold); background: rgba(240,185,11,0.1); }
    .rank-S\+ { color: #ff00ff; border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
    .rank-S { color: #b64dff; border-color: #b64dff; }
    .rank-A\+ { color: #ff0000; border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
    .rank-A { color: #ff6666; border-color: #ff6666; }
    .rank-B\+ { color: #0080ff; border-color: #0080ff; }
    .rank-B { color: #66b2ff; border-color: #66b2ff; }
    .rank-C { color: #4dffb3; border-color: #4dffb3; }

    .role-badge { font-size: 0.55em; padding: 2px 10px; border-radius: 5px; font-weight: 900; text-transform: uppercase; border: 1.5px solid; display: inline-block; margin-bottom: 8px; }
    .role-founder { color: #b64dff; border-color: #b64dff; text-shadow: 0 0 10px #b64dff; }
    .role-overseer { color: #32cd32; border-color: #32cd32; }
    .role-bloodline { color: var(--blood); border-color: var(--blood); }

    .elo-val { color: var(--gold); font-weight: 900; font-size: 1.3em; text-shadow: 0 0 10px rgba(240,185,11,0.5); }
    .avatar-circle { width: 48px; height: 48px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid #fff; flex-shrink: 0; }
    
    #search { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); color: white; box-sizing: border-box; margin-bottom: 20px; }
    body {
    background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                      url('Без названия.jpg'); 
}

@media (max-width: 600px) {
    body {
        background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                          url('фон моб.jpg');
    }
}
  </style>
</head>
<body>
  <header>
    <h1>🏆 LEADERBOARD</h1>
  </header>

  <div class="container">
    <input type="text" id="search" placeholder="Поиск игрока...">
    <div id="rating-list">
      <!-- Сюда JS подставит карточки -->
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
