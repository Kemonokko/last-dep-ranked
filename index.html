<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Tactile Wars: All Stars Ranked</title>
    
    <meta name="description" content="Добро пожаловать на Tactile Wars: All Stars Ranked! Официальная соревновательная лига. Следи за таблицей лидеров в реальном времени, изучай историю матчей и прокачивай свой Эло-рейтинг до ранга Дракона.">
    
    <meta name="keywords" content="tactile wars, all stars ranked, tactile wars эло, таблица лидеров tactile wars, тактайл варс рейтинг, эло лига">
</head>
<body>

    <header>
        <div class="logo">TW: All Stars Ranked</div>
        <nav>
            <button class="nav-btn active" onclick="switchTab('rating')">Рейтинг</button>
            <button class="nav-btn" onclick="switchTab('history')">История боёв</button>
            <button class="nav-btn" onclick="switchTab('profile')">Мой профиль</button>
        </nav>
    </header>

    <main>
        <section id="tab-rating" class="tab-content active">
            <div class="search-box">
                <input type="text" id="search-rating" placeholder="Поиск игрока в рейтинге..." oninput="filterRating()">
            </div>
            <table class="rating-table">
                <thead>
                    <tr>
                        <th>Место</th>
                        <th>Игрок</th>
                        <th>Эло</th>
                        <th>Ранг</th>
                    </tr>
                </thead>
                <tbody id="rating-list">
                </tbody>
            </table>
        </section>

        <section id="tab-history" class="tab-content">
            <div class="search-box">
                <input type="text" id="search-history" placeholder="Поиск матчей игрока..." oninput="filterHistory()">
            </div>
            <div id="history-list" class="history-container">
            </div>
        </section>

        <section id="tab-profile" class="tab-content">
            <div id="profile-container" class="profile-card">
                <div id="auth-forms" style="text-align: center;">
                    <h3>Авторизация в лиге</h3>
                    <p style="margin-bottom: 20px; color: #a8a8b3;">Для доступа к профилю войдите через ваш Google-аккаунт</p>
                    <button onclick="window.loginWithGoogle()" style="background: #ffffff !important; color: #000000 !important; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold;">
                        <img src="https://yandex.ru" style="width: 20px; height: 20px;">
                        Войти через Google
                    </button>
                </div>
            </div>
        </section>
    </main>

    <div id="player-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('player-modal').style.display='none'">&times;</span>
            <div id="modal-user-data">
            </div>
        </div>
    </div>
    <script src="https://gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA-3WJn73F3kdc8nLFjHPiBTQqKTXXXi_4",
          authDomain: "tactile-wars.firebaseapp.com",
          projectId: "tactile-wars",
          storageBucket: "tactile-wars.firebasestorage.app",
          messagingSenderId: "352492746252",
          appId: "1:352492746252:web:a075c2d85ff5d2e97da029",
          measurementId: "G-CV4B3WCJVP"
        };
        firebase.initializeApp(firebaseConfig);
        window.db = firebase.firestore();
    </script>
    
    <script type="module" src="script.js"></script>
    <script type="module" src="admin.js"></script>
    <script type="module" src="stats.js"></script>
</body>
</html>
