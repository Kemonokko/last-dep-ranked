<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANKED LEAGUE</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #050000;
            --card: #3d0606;
            --border: #5a0a0a;
            --gold: #f0b90b;
            --blood: #ff0000;
            --founder: #b64dff;
            --bloodline: #ff4444;
        }

        body {
            background: var(--bg) url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { width: 100%; padding: 20px 40px; box-sizing: border-box; }
        h1 { color: var(--blood); text-shadow: 0 0 15px var(--blood); margin: 0; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        .container { width: 95%; max-width: 500px; padding: 20px 0; }

        #search {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(61, 6, 6, 0.8); color: white; margin-bottom: 20px; outline: none; box-sizing: border-box;
        }

        /* КАРТОЧКА */
        .match-card {
            background: var(--card) !important; border: 1.5px solid var(--border) !important;
            border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .match-card:hover { transform: translateY(-3px); border-color: var(--blood) !important; background: #4d0808 !important; }

        .avatar-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #555; background-size: cover; background-position: center; flex-shrink: 0; }

        /* РОЛИ */
        .role-founder { color: var(--founder) !important; text-shadow: 0 0 10px var(--founder); }
        .role-bloodline { color: var(--bloodline) !important; text-shadow: 0 0 10px var(--bloodline); }
        .role-player { color: #ffffff !important; }

        /* РАНГИ */
        .badge { font-size: 0.75em; padding: 4px 10px; border-radius: 6px; border: 1.5px solid; font-weight: 900; margin-top: 5px; display: inline-block; text-transform: uppercase; }
        .rank-S { color: var(--founder); border-color: var(--founder); box-shadow: 0 0 10px var(--founder); }
        .rank-A { color: #ff4d4d; border-color: #ff4d4d; }
        .rank-B { color: #0088ff; border-color: #0088ff; }

        /* МОДАЛКА */
        #profile-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
    </style>
</head>
<body>
    <header><h1 onclick="location.reload()">LEAGUE</h1></header>
    <div class="container">
        <input type="text" id="search" placeholder="Поиск бойца..." oninput="handleSearch()">
        <div id="rating-list">Загрузка лиги...</div>
    </div>

    <div id="profile-modal" onclick="this.style.display='none'">
        <div id="profile-content" class="container" style="background: var(--card); padding: 30px; border-radius: 25px; border: 1.5px solid var(--border); position: relative;" onclick="event.stopPropagation()"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
