<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Dep Ranked</title>
<style>
    :root { 
      --bg: #050000; --card: #120303; --border: #3d0000; --text: #ffffff; 
      --gold: #f0b90b; --blood: #ff0000;
      /* Цвета Ролей */
      --founder: #b64dff; --bloodline: #880000; --overseer: #00ff00; --archivist: #00ffff;
      /* Цвета Рангов */
      --color-s: #b64dff; --color-a: #ff4d4d; --color-b: #0088ff; --color-c: #00ff00;
    }

    body { 
      background-color: var(--bg) !important;
      background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('bg.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      color: var(--text); font-family: sans-serif; margin: 0; padding: 0 10px 100px 10px;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }

    /* ЗАГОЛОВОК СЛЕВА */
    header { width: 100%; padding: 15px 25px; text-align: left; box-sizing: border-box; }
    h1 { 
      color: #ff0000 !important; font-size: 2.6em; text-transform: capitalize; 
      text-shadow: 0 0 15px #ff0000; margin: 0; cursor: pointer; display: inline-block; 
    }

    .container { width: 95%; max-width: 500px; }

    /* КНОПКИ ПЕРЕКЛЮЧЕНИЯ */
    .nav-btns { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
    .nav-btn { flex: 1; background: var(--card); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .nav-btn.active {
    background: var(--blood) !important;
    border-color: var(--blood) !important;
}

    /* КАРТОЧКА ИГРОКА (Чистый код без дублей) */
    .match-card { 
      background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; 
      margin-top: 12px; padding: 12px 18px; display: flex; align-items: center; gap: 15px; 
      width: 100%; box-sizing: border-box; min-height: 80px; cursor: pointer; transition: 0.2s;
    }
    
    .avatar-circle { 
      width: 50px; height: 50px; border-radius: 50%; background-size: cover; 
      border: 2.5px solid; flex-shrink: 0; transition: 0.3s; 
    }

    .elo-val { color: var(--gold); font-weight: 900; font-size: 1.4em; line-height: 1; }
    .wr-val { font-size: 0.7em; color: #848e9c; font-weight: bold; margin-top: 4px; }

    /* РАНГИ */
    .badge { font-size: 0.85em; padding: 5px 12px; border-radius: 8px; border: 2px solid; margin-top: 8px; display: inline-block; font-weight: 900; }
    
    @keyframes dragon-glow { 0%, 100% { box-shadow: 0 0 10px #fff; } 50% { box-shadow: 0 0 25px #fff; } }
    .rank-Дракон { background: #000 !important; color: #fff !important; border-color: #fff !important; animation: dragon-glow 3s infinite; }
    
    .rank-S\+, .rank-A\+, .rank-B\+ { box-shadow: 0 0 15px currentColor; text-shadow: 0 0 5px currentColor; }
    .rank-S\+, .rank-S { color: var(--color-s); border-color: var(--color-s); }
    .rank-A\+, .rank-A { color: var(--color-a); border-color: var(--color-a); }
    .rank-B\+, .rank-B { color: var(--color-b); border-color: var(--color-b); }
    .rank-C { color: var(--color-c); border-color: var(--color-c); }

    /* УМНЫЙ ХОВЕР: Навел на карту -> загорелся ник */
    .nick-hover { transition: 0.3s; pointer-events: none; color: white; font-size: 1.15em; text-decoration: none; }
    
    .match-card:hover .role-founder { color: var(--founder) !important; text-shadow: 0 0 15px var(--founder); }
    .match-card:hover .role-bloodline { color: var(--bloodline) !important; text-shadow: 0 0 15px var(--bloodline); }
    .match-card:hover .role-overseer { color: var(--overseer) !important; text-shadow: 0 0 15px var(--overseer); }
    .match-card:hover .role-archivist { color: var(--archivist) !important; text-shadow: 0 0 15px var(--archivist); }

    /* ПОИСК И АДМИНКА */
    #search { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
    #admin-panel { background: var(--card); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .admin-input { width: 100%; padding: 12px; border-radius: 10px; background: #000; color: white; border: 1px solid var(--border); margin-bottom: 10px; box-sizing: border-box; }
    .admin-btn-submit { background: var(--blood); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; }
</style>
</head>
<body>
  <header><h1>Last Dep Ranked</h1></header>
  
  <div class="container">
    <button id="admin-btn" onclick="document.getElementById('admin-panel').style.display = document.getElementById('admin-panel').style.display === 'none' ? 'block' : 'none'" 
            style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer; margin-bottom:15px; font-weight:bold;">
      ⚙️ АДМИН ПАНЕЛЬ
    </button>

<div class="nav-btns">
<button onclick="showRating()" id="btn-rating" class="nav-btn active">🏆 РЕЙТИНГ</button>
<button onclick="showHistory()" id="btn-history" class="nav-btn">📜 ИСТОРИЯ</button>
<button onclick="showMyProfile()" id="btn-profile" class="nav-btn">👤 ПРОФИЛЬ</button>
</div>
    <div id="my-profile-section" style="display:none; background:var(--card); border:2px solid var(--border); border-radius:20px; padding:25px; margin-top:10px;">
        
        <!-- Форма Входа (если не залогинен) -->
        <div id="auth-ui">
            <h2 style="color:var(--gold); text-align:center; margin-top:0;">Вход в аккаунт</h2>
            <p style="font-size:0.8em; color:#848e9c; text-align:center;">Найдите себя в рейтинге и введите почту, чтобы получить доступ к функциям.</p>
            <input type="email" id="login-email" class="admin-input" placeholder="Введите ваш Email..." style="text-align:center; margin-top:10px;">
            <button onclick="window.handleLogin()" class="admin-btn-submit" style="margin-top:10px;">ПОДТВЕРДИТЬ</button>
        </div>

        <!-- Личный Кабинет (если залогинен) -->
        <div id="cabinet-ui" style="display:none; text-align:center;">
            <h2 id="cabinet-nick" style="color:white; margin-top:0;">Твой Ник</h2>
            <div id="cabinet-role" style="font-size:0.7em; font-weight:900; color:var(--gold); border:1px solid var(--gold); display:inline-block; padding:3px 10px; border-radius:5px;">FOUNDER</div>
            
            <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
            
            <p style="font-size:0.8em; color:#848e9c; margin-bottom:10px;">Смена аватарки:</p>
            <input type="text" id="new-avatar-url" class="admin-input" placeholder="https://ссылка-на-фото.jpg">
            <button onclick="window.updateAvatar()" class="admin-btn-submit" style="margin-top:10px; background:#222; border:1px solid #444;">ОБНОВИТЬ АВУ</button>
            
            <button onclick="window.handleLogout()" style="background:none; border:none; color:#555; margin-top:25px; cursor:pointer; font-size:0.8em; text-decoration:underline;">Выйти из системы</button>
        </div>
    </div>
    <div id="admin-panel" style="display:none;">
      <h2 style="color: var(--gold); text-align: center; margin-top: 0; font-size: 1.2em;">⚔️ ЗАПИСАТЬ МАТЧ</h2>
      <input type="date" id="match-date" class="admin-input">
      <input type="text" id="win-input" class="admin-input" list="players-list" placeholder="Ник победителя" oninput="window.updateMatchPreview()">
      <input type="text" id="loss-input" class="admin-input" list="players-list" placeholder="Ник проигравшего" oninput="window.updateMatchPreview()">
      <datalist id="players-list"></datalist>
      <select id="score-select" class="admin-input" onchange="window.updateMatchPreview()">
          <option value="3:0">Счёт 3:0 (x1.3)</option>
          <option value="3:1">Счёт 3:1 (x1.0)</option>
          <option value="3:2">Счёт 3:2 (x0.7)</option>
      </select>
      <div id="match-preview" style="color:var(--gold); font-size:0.85em; text-align:center; margin-bottom:10px; display:none;"></div>
      <button class="admin-btn-submit" onclick="handleAddMatch()">ЗАПИСАТЬ В БАЗУ</button>
    </div>

    <input type="text" id="search" placeholder="Поиск игрока...">
    <div id="rating-list">Загрузка...</div>
  </div>

<div id="profile-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
    <div style="background:var(--card); border:2px solid var(--border); width:90%; max-width:400px; padding:30px; border-radius:20px; position:relative; text-align:center;">
        <div id="close-profile" style="position:absolute; top:15px; right:20px; color:#555; cursor:pointer; font-size:1.5em;">✕</div>
        
        <div id="prof-avatar" style="width:110px; height:110px; border-radius:50%; border:3px solid #fff; margin:0 auto 15px; background-size:cover; background-position:center;"></div>
        <h2 id="prof-nick" style="margin:0; color:white; font-size:1.8em;">Никнейм</h2>
        <div id="prof-role-badge" style="display:inline-block; margin-top:8px; font-weight:900; font-size:0.75em; padding:4px 12px; border-radius:6px; border: 1.5px solid;">РОЛЬ</div>
        
        <hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">
        
        <!-- Подробная статистика игрока -->
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; text-align:left;">
            <div>
                <div style="font-size:0.7em; color:#848e9c;">ТЕКУЩИЙ ЭЛО</div>
                <div id="prof-elo" style="color:var(--gold); font-weight:900; font-size:1.2em;">0</div>
            </div>
            <div>
                <div style="font-size:0.7em; color:#848e9c;">ВИНРЕЙТ</div>
                <div id="prof-wr" style="color:white; font-weight:900; font-size:1.2em;">0%</div>
            </div>
        </div>
    </div>
</div>
  <script type="module" src="app.js"></script>
</body>
</html>
