<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рейтинговая Система</title>
  <style>
:root {
  /* Цвета Рангов */
  --color-s: #b64dff;   /* Фиолетовый S */
  --color-a: #ff4d4d;   /* Красный A */
  --color-b: #0088ff;   /* Синий B */
  --color-c: #00ff00;   /* Зеленый C */
  --dragon-bg: #000000;
}

/* Анимация "Белое дыхание" для DRAGON */
@keyframes dragon-white-glow {
  0% { box-shadow: 0 0 10px #ffffff, inset 0 0 5px #ffffff; }
  50% { box-shadow: 0 0 25px #ffffff, inset 0 0 10px #ffffff; }
  100% { box-shadow: 0 0 10px #ffffff, inset 0 0 5px #ffffff; }
}

.rank-DRAGON { 
  background: var(--dragon-bg) !important; 
  color: #ffffff !important; 
  border: 1.5px solid #ffffff !important; 
  animation: dragon-white-glow 3s infinite ease-in-out;
  font-weight: 900;
  text-transform: capitalize; /* Сделает "Dragon" */
}

/* Плюсовые ранги (Яркий неоновый свет) */
.rank-S\+ { color: var(--color-s); border-color: var(--color-s); box-shadow: 0 0 15px var(--color-s); text-shadow: 0 0 5px var(--color-s); }
.rank-A\+ { color: var(--color-a); border-color: var(--color-a); box-shadow: 0 0 15px var(--color-a); text-shadow: 0 0 5px var(--color-a); }
.rank-B\+ { color: var(--color-b); border-color: var(--color-b); box-shadow: 0 0 15px var(--color-b); text-shadow: 0 0 5px var(--color-b); }

/* Обычные ранги (Спокойные цвета) */
.rank-S { color: var(--color-s); border-color: var(--color-s); opacity: 0.7; }
.rank-A { color: var(--color-a); border-color: var(--color-a); opacity: 0.7; }
.rank-B { color: var(--color-b); border-color: var(--color-b); opacity: 0.7; }
.rank-C { color: var(--color-c); border-color: var(--color-c); opacity: 0.8; }
    }
    body { 
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)); 
      background-size: cover; background-position: center; background-attachment: fixed;
      color: var(--text); font-family: sans-serif; margin: 0; padding: 0 10px 100px 10px;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
      background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('bg.jpg');
    }
    header { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
    h1 { color: var(--blood); font-size: 1.8em; text-shadow: 0 0 15px rgba(204,0,0,0.6); }
    .container { width: 95%; max-width: 500px; }
    #search { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); color: white; margin-bottom: 20px; box-sizing: border-box; }
    .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; margin-top: 12px; padding: 16px; display: flex; align-items: center; gap: 15px; }
    .avatar-circle { width: 48px; height: 48px; border-radius: 50%; background-size: cover; border: 2px solid #fff; flex-shrink: 0; }
    .elo-val { color: var(--gold); font-weight: 900; font-size: 1.3em; }
    .badge { font-size: 0.75em; padding: 4px 10px; border-radius: 6px; border: 1.5px solid; margin-top: 5px; display: inline-block; }
    
    /* Стили для Админки */
    #admin-panel { background: var(--card); border: 1.5px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; box-sizing: border-box; }
    .admin-input { width: 100%; padding: 12px; border-radius: 10px; background: #000; color: white; border: 1px solid var(--border); margin-bottom: 10px; box-sizing: border-box; }
    .admin-btn-submit { background: var(--blood); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; }

    /* Стили рангов */
    .rank-Дракон { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
    .rank-S\+ { color: #ff00ff; border-color: #ff00ff; }
    .rank-S { color: #b64dff; border-color: #b64dff; }

    @media (max-width: 600px) {
        body { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('bgm.jpg'); }
    }
  </style>
</head>
<body>
  <header><h1>Last Dep Ranked</h1></header>
  
 <div class="container">
    <!-- Кнопка вызова админки -->
    <button onclick="document.getElementById('admin-panel').style.display = document.getElementById('admin-panel').style.display === 'none' ? 'block' : 'none'" 
            style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer; margin-bottom:15px; font-weight:bold;">
      ⚙️ АДМИН ПАНЕЛЬ
    </button>

    <!-- ВОТ ЭТИ КНОПКИ БЫЛИ ПОТЕРЯНЫ (ВЕРНУЛИ) -->
    <div style="display: flex; gap: 10px; margin-bottom: 15px; width: 100%;">
        <button onclick="showRating()" id="btn-rating" style="flex: 1; background: var(--blood); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">🏆 РЕЙТИНГ</button>
        <button onclick="showHistory()" id="btn-history" style="flex: 1; background: var(--card); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">📜 ИСТОРИЯ</button>
    </div>

    <!-- Блок Админки с Предпросмотром -->
    <div id="admin-panel" style="display:none;">
      <h2 style="color: var(--gold); text-align: center; margin-top: 0; font-size: 1.2em;">⚔️ ЗАПИСАТЬ МАТЧ</h2>
      <input type="date" id="match-date" class="admin-input">
      <input type="text" id="win-input" class="admin-input" list="players-list" placeholder="Ник победителя" oninput="window.updateMatchPreview()">
      <input type="text" id="loss-input" class="admin-input" list="players-list" placeholder="Ник проигравшего" oninput="window.updateMatchPreview()">
      <datalist id="players-list"></datalist>
      <select id="score-select" class="admin-input" onchange="window.updateMatchPreview()">
          <option value="3:0">Счёт 3:0 (x1.3)</option>
          <option value="3:1">Счёт 3:1 (x1.0)</option>
          <option value="3:2">Счёт 3:2 (x0.7)</option>
      </select>
      <div id="match-preview" style="color: var(--gold); font-size: 0.85em; text-align: center; margin-bottom: 10px; background: rgba(240, 185, 11, 0.1); padding: 8px; border-radius: 8px; display: none;"></div>
      <button class="admin-btn-submit" onclick="handleAddMatch()">ЗАПИСАТЬ В БАЗУ</button>
    </div>

    <input type="text" id="search" placeholder="Поиск игрока...">
    <div id="rating-list">Загрузка...</div>
  </div>


  <script type="module" src="app.js"></script>
</body>
</html>
