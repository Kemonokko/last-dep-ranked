<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Dep Ranked</title>
<style>
    :root { 
      --bg: #050000; --card: #120303; --border: #3d0000; --text: #ffffff; 
      --gold: #f0b90b; --blood: #ff0000; /* Ядреный красный */
      --founder: #b64dff; --bloodline: #ff4d4d; --overseer: #00ff00; --archivist: #00ffff;
      --color-s: #b64dff; --color-a: #ff4d4d; --color-b: #0088ff; --color-c: #00ff00;
    }

    body { 
      background-color: var(--bg) !important;
      background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('bg.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      color: var(--text); font-family: sans-serif; margin: 0; padding: 0 10px 100px 10px;
    }

    /* ЯДРЕНЫЙ КРАСНЫЙ ЗАГОЛОВОК */
    h1 { color: #ff0000 !important; font-size: 2.2em; text-transform: uppercase; text-shadow: 0 0 20px #ff0000; margin: 15px 0; cursor: pointer; text-align: center; }

    .container { width: 95%; max-width: 500px; margin: 0 auto; }

    /* КАРТОЧКА ИГРОКА */
    .match-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; margin-top: 10px; padding: 12px 18px; display: flex; align-items: center; gap: 15px; width: 100%; box-sizing: border-box; }
    .avatar-circle { width: 50px; height: 50px; border-radius: 50%; background-size: cover; border: 2.5px solid #fff; flex-shrink: 0; }
    .elo-val { color: var(--gold); font-weight: 900; font-size: 1.35em; }
    .wr-val { font-size: 0.7em; color: #848e9c; font-weight: bold; }

    /* РАНГИ */
    .badge { font-size: 0.8em; padding: 4px 10px; border-radius: 7px; border: 2.1px solid; margin-top: 5px; display: inline-block; font-weight: 900; }
    .rank-Дракон { background: #000 !important; color: #fff !important; border-color: #fff !important; box-shadow: 0 0 15px #fff; }
    .rank-S\+, .rank-S { color: var(--color-s); border-color: var(--color-s); }
    .rank-A\+, .rank-A { color: var(--color-a); border-color: var(--color-a); }
    .rank-B\+, .rank-B { color: var(--color-b); border-color: var(--color-b); }
    .rank-C { color: var(--color-c); border-color: var(--color-c); }
    .rank-S\+, .rank-A\+, .rank-B\+ { box-shadow: 0 0 12px currentColor; text-shadow: 0 0 5px currentColor; }

    /* АДМИН ПАНЕЛЬ (ВОЗВРАТ ВИДА) */
    #admin-panel { background: var(--card); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .admin-input { width: 100%; padding: 10px; border-radius: 8px; background: #000; color: #fff; border: 1px solid var(--border); box-sizing: border-box; font-size: 0.9em; }
    .admin-btn-submit { background: var(--blood); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; }

    /* ХОВЕРЫ НИКОВ */
    .nick-hover:hover { cursor: pointer; transition: 0.2s; }
    .role-founder:hover { color: var(--founder) !important; text-shadow: 0 0 15px var(--founder); }
    .role-bloodline:hover { color: var(--bloodline) !important; text-shadow: 0 0 15px var(--bloodline); }
    .role-overseer:hover { color: var(--overseer) !important; text-shadow: 0 0 15px var(--overseer); }
    .role-archivist:hover { color: var(--archivist) !important; text-shadow: 0 0 15px var(--archivist); }

    #search { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); color: white; margin-bottom: 20px; box-sizing: border-box; }
  header { 
  width: 100%; 
  padding: 10px 20px; 
  text-align: left; 
  box-sizing: border-box;
}
</style>
</head>
<body>
  <header><h1>Last Dep Ranked</h1></header>
  <div class="container">
    <button id="admin-btn" onclick="document.getElementById('admin-panel').style.display = document.getElementById('admin-panel').style.display === 'none' ? 'block' : 'none'" 
            style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer; margin-bottom:15px; font-weight:bold;">
      ⚙️ АДМИН ПАНЕЛЬ
    </button>

    <div style="display: flex; gap: 10px; margin-bottom: 15px; width: 100%;">
        <button onclick="showRating()" id="btn-rating" style="flex: 1; background: var(--blood); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">🏆 РЕЙТИНГ</button>
        <button onclick="showHistory()" id="btn-history" style="flex: 1; background: var(--card); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">📜 ИСТОРИЯ</button>
    </div>

    <div id="admin-panel" style="display:none;">
      <h2 style="color: var(--gold); text-align: center; margin-top: 0; font-size: 1.1em;">⚔️ ЗАПИСАТЬ МАТЧ</h2>
      
      <div class="admin-grid">
          <input type="date" id="match-date" class="admin-input">
          <select id="score-select" class="admin-input" onchange="window.updateMatchPreview()">
              <option value="3:0">3:0 (x1.3)</option>
              <option value="3:1">3:1 (x1.0)</option>
              <option value="3:2">3:2 (x0.7)</option>
          </select>
          <input type="text" id="win-input" class="admin-input" list="players-list" placeholder="Победитель" oninput="window.updateMatchPreview()">
          <input type="text" id="loss-input" class="admin-input" list="players-list" placeholder="Проигравший" oninput="input="window.updateMatchPreview()">
      </div>

      <datalist id="players-list"></datalist>
      <div id="match-preview" style="color:var(--gold); font-size:0.8em; text-align:center; margin-bottom:10px; display:none; background:rgba(240,185,11,0.1); padding:10px; border-radius:10px;"></div>
      <button class="admin-btn-submit" onclick="handleAddMatch()">ЗАПИСАТЬ В БАЗУ</button>
    </div>


    <input type="text" id="search" placeholder="Поиск игрока...">
    <div id="rating-list">Загрузка...</div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
