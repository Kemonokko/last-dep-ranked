<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Dep Ranked</title>
  <style>
:root {
  --bg: #050000; --card: #120303; --border: #3d0000; --text: #ffffff; 
  --gold: #f0b90b; --blood: #cc0000;
  --founder: #b64dff; --bloodline: #ff4d4d; --overseer: #00ff00; --archivist: #00ffff;
  --color-s: #b64dff; --color-a: #ff4d4d; --color-b: #0088ff; --color-c: #00ff00;
}

body { 
  background-color: var(--bg) !important;
  background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('bg.jpg');
  background-size: cover; background-position: center; background-attachment: fixed;
  color: var(--text); font-family: sans-serif; margin: 0; padding: 0 10px 100px 10px;
}

.match-card { 
  background: var(--card); border: 1.5px solid var(--border); border-radius: 18px; 
  margin-top: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 15px; 
  min-height: 80px;
}

.avatar-circle { 
  width: 48px; 
  height: 48px; 
  border-radius: 50%; 
  background-size: cover; 
  border: 2.5px solid #fff; /* Жирная рамка */
  flex-shrink: 0; 
  transition: 0.3s;
}
.elo-val { color: var(--gold); font-weight: 900; font-size: 1.4em; }
.wr-val { font-size: 0.7em; color: #848e9c; font-weight: bold; margin-top: 4px; }

/* РАНГИ */
.badge { font-size: 0.9em; padding: 4px 12px; border-radius: 8px; border: 2px solid; margin-top: 6px; display: inline-block; font-weight: 900; }
    
@keyframes dragon-glow {
  0% { box-shadow: 0 0 10px #fff; }
  50% { box-shadow: 0 0 25px #fff; }
  100% { box-shadow: 0 0 10px #fff; }
}
.rank-Дракон { background: #000 !important; color: #fff !important; border-color: #fff !important; animation: dragon-glow 3s infinite ease-in-out; }

/* Сочные ранги (с подсветкой для + и без для обычных) */
.rank-S\+ { color: var(--color-s); border-color: var(--color-s); box-shadow: 0 0 15px var(--color-s); text-shadow: 0 0 5px var(--color-s); }
.rank-A\+ { color: var(--color-a); border-color: var(--color-a); box-shadow: 0 0 15px var(--color-a); text-shadow: 0 0 5px var(--color-a); }
.rank-B\+ { color: var(--color-b); border-color: var(--color-b); box-shadow: 0 0 15px var(--color-b); text-shadow: 0 0 5px var(--color-b); }
.rank-S { color: var(--color-s); border-color: var(--color-s); }
.rank-A { color: var(--color-a); border-color: var(--color-a); }
.rank-B { color: var(--color-b); border-color: var(--color-b); }
.rank-C { color: var(--color-c); border-color: var(--color-c); }

/* ХОВЕРЫ НИКОВ (Только для ролей) */
/* Ховеры ников по ролям (как ты просил - цветные) */
.role-founder:hover { color: #b64dff !important; text-shadow: 0 0 15px #b64dff; }
.role-overseer:hover { color: #00ff00 !important; text-shadow: 0 0 15px #00ff00; }
.role-archivist:hover { color: #00ffff !important; text-shadow: 0 0 15px #00ffff; }
.role-bloodline:hover { color: #ff4d4d !important; text-shadow: 0 0 15px #ff4d4d; }
/* Обычный ник просто белый при наведении */
.role-player:hover { color: #fff !important; text-shadow: none; }

    /* ИНПУТЫ И КНОПКИ */
    #search { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); color: white; margin-bottom: 20px; box-sizing: border-box; }
    .admin-input { width: 100%; padding: 12px; border-radius: 10px; background: #000; color: white; border: 1px solid var(--border); margin-bottom: 10px; box-sizing: border-box; }
    .admin-btn-submit { background: var(--blood); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; }

    @media (max-width: 600px) { body { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('bgm.jpg'); } }
  </style>
</head>
<body>
  <header><h1>🏆 Last Dep Ranked</h1></header>
  
  <div class="container">
    <button id="admin-btn" onclick="document.getElementById('admin-panel').style.display = document.getElementById('admin-panel').style.display === 'none' ? 'block' : 'none'" 
            style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer; margin-bottom:15px; font-weight:bold;">
      ⚙️ АДМИН ПАНЕЛЬ
    </button>

    <div style="display: flex; gap: 10px; margin-bottom: 15px; width: 100%;">
        <button onclick="showRating()" id="btn-rating" style="flex: 1; background: var(--blood); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">🏆 РЕЙТИНГ</button>
        <button onclick="showHistory()" id="btn-history" style="flex: 1; background: var(--card); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">📜 ИСТОРИЯ</button>
    </div>

    <div id="admin-panel" style="display:none;">
      <h2 style="color: var(--gold); text-align: center; margin-top: 0; font-size: 1.2em;">⚔️ ЗАПИСАТЬ МАТЧ</h2>
      <input type="date" id="match-date" class="admin-input">
      <input type="text" id="win-input" class="admin-input" list="players-list" placeholder="Ник победителя" oninput="window.updateMatchPreview()">
      <input type="text" id="loss-input" class="admin-input" list="players-list" placeholder="Ник проигравшего" oninput="window.updateMatchPreview()">
      <datalist id="players-list"></datalist>
      <select id="score-select" class="admin-input" onchange="window.updateMatchPreview()">
          <option value="3:0">Счёт 3:0 (x1.3)</option>
          <option value="3:1">Счёт 3:1 (x1.0)</option>
          <option value="3:2">Счёт 3:2 (x0.7)</option>
      </select>
      <div id="match-preview" style="color: var(--gold); font-size: 0.85em; text-align: center; margin-bottom: 10px; background: rgba(240,185,11,0.1); padding: 8px; border-radius: 8px; display: none;"></div>
      <button class="admin-btn-submit" onclick="handleAddMatch()">ЗАПИСАТЬ В БАЗУ</button>
    </div>

    <input type="text" id="search" placeholder="Поиск игрока...">
    <div id="rating-list">Загрузка...</div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
